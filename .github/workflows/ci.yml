name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome ci, repo-wide)
        run: pnpm lint

      - name: Typecheck / Test / Build (turbo)
        run: pnpm turbo run typecheck test build --concurrency=4

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @pitamark/web exec playwright install --with-deps chromium

      # `wrangler dev` reads `.dev.vars` at startup. The Playwright globalSetup
      # writes the same file but races with webServer launch in CI. Pre-write
      # here so BYPASS_TURNSTILE is in effect when wrangler boots. All values
      # are static (no untrusted input).
      - name: Prepare apps/api/.dev.vars for E2E
        run: |
          cat > apps/api/.dev.vars <<'EOF'
          BYPASS_TURNSTILE="true"
          BYPASS_RATE_LIMIT="true"
          TURNSTILE_SECRET_KEY="1x0000000000000000000000000000000AA"
          ROOM_TOKEN_SECRET="ci-test-token-secret-min-32-bytes-long-enough"
          EOF

      - name: Run E2E tests
        run: pnpm turbo run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
