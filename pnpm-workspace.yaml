packages:
  - "apps/*"
  - "packages/*"

catalog:
  # Phase 8.x modernity review #2 H1: TypeScript bumped from 5.6.3 to ^6.0
  # (npm latest: 6.0.3). The previous `5.6.3` exact pin had no documented
  # rationale; switching to caret keeps patch updates flowing. TS 6's
  # tighter `noUncheckedIndexedAccess` and decorator standardization are
  # already compatible with this codebase.
  typescript: ^6.0
  vitest: ^4.1
  # Phase 8.x tests review #8 M1: needed by `--coverage` runs in vitest.
  '@vitest/coverage-v8': ^4.1
  zod: ^4.4
  nanoid: ^5.0
  '@hono/zod-validator': ^0.7
  '@hono/zod-openapi': ^1.3
  '@scalar/hono-api-reference': ^0.10
  # Phase 8.x modernity review #2 M2: hono moved into the catalog so both
  # apps/web and apps/api stay version-locked. `^4.12` is the prior pin.
  hono: ^4.12
  '@types/node': ^22
  react: ^19.2
  react-dom: ^19.2
  '@types/react': ^19.2
  '@types/react-dom': ^19.2
  konva: ^10.2
  react-konva: ^19.2
  use-image: ^1.1
  # Phase 8.x modernity review #2 M1: bumped from ^0.460 (0.x major was
  # frozen) to ^1.0 (npm latest: 1.14.0). All lucide icons used in the
  # project (ImagePlus / ArrowUpRight / Lock / X / ...) keep the same
  # named export across the v1 boundary — verified via grep.
  lucide-react: ^1.0
  yjs: ^13.6
  y-websocket: ^3.0
  y-protocols: ^1.0
  y-durableobjects: ^1.0
