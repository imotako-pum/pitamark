<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#5b6dff" />
    <title>pitamark — 画像URL一発で共同注釈</title>
    <meta
      name="description"
      content="画像にハイライト・吹き出し・矢印・テキストをオーバーレイし、URL一発で共同編集できる、日本語ファーストの軽量Webアプリ。"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="%VITE_PUBLIC_URL%" />
    <meta property="og:site_name" content="pitamark" />
    <meta property="og:title" content="pitamark — 画像URL一発で共同注釈" />
    <meta
      property="og:description"
      content="画像にハイライト・吹き出し・矢印・テキストをオーバーレイし、URL一発で共同編集できる、日本語ファーストの軽量Webアプリ。"
    />
    <meta property="og:url" content="%VITE_PUBLIC_URL%" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%VITE_PUBLIC_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="pitamark — 画像URL一発で共同注釈" />
    <!-- twitter:card は画像 (og:image) を有効化したため summary_large_image に
         切り替え (Phase 10.D)。`%VITE_PUBLIC_URL%` は Phase 10.F で確定値に置換。 -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="pitamark — 画像URL一発で共同注釈" />
    <meta
      name="twitter:description"
      content="画像にハイライト・吹き出し・矢印・テキストをオーバーレイし、URL一発で共同編集できる、日本語ファーストの軽量Webアプリ。"
    />
    <meta name="twitter:image" content="%VITE_PUBLIC_URL%/og-image.png" />
    <!-- Phase 10.D: structured data for search engines. SoftwareApplication
         schema covers the bare minimum (name / description / category / OS /
         offer). url + image use %VITE_PUBLIC_URL% placeholders that Vite
         substitutes at build time from the env var. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "pitamark",
        "description": "画像にハイライト・吹き出し・矢印・テキストをオーバーレイし、URL一発で共同編集できる、日本語ファーストの軽量Webアプリ。",
        "url": "%VITE_PUBLIC_URL%",
        "image": "%VITE_PUBLIC_URL%/og-image.png",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "JPY" }
      }
    </script>
    <!-- Phase 10.H: FAQPage schema mirrors apps/web/src/components/landing/Faq.tsx
         (ja). Keep the Q/A copy in sync if the Japanese FAQ wording changes. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "画像はどこに保存される？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Cloudflare R2 に保存し、TTL（デフォルト 24 時間 / 最大 7 日）で自動削除されます。"
            }
          },
          {
            "@type": "Question",
            "name": "無料で使える？",
            "acceptedAnswer": { "@type": "Answer", "text": "はい、基本機能は無料です。" }
          },
          {
            "@type": "Question",
            "name": "誰が編集できる？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "URL を知っている人なら誰でも。パスワード保護も設定できます。"
            }
          },
          {
            "@type": "Question",
            "name": "広告は出る？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "将来の収益化に向けて表示枠を用意しています。現在は配信していません。"
            }
          }
        ]
      }
    </script>
    <!-- Phase 10.H: AdSense site-verification meta. Empty in dev / preview;
         set VITE_ADSENSE_CLIENT_ID to "ca-pub-XXXXXXXXXXXXXXXX" once the
         AdSense account is approved (Phase 11+). The actual <ins> tags and
         the loader script are NOT shipped here — see Phase 10.H plan. -->
    <meta name="google-adsense-account" content="%VITE_ADSENSE_CLIENT_ID%" />
    <!-- Phase 7: Cloudflare Turnstile loader. Site key is read at runtime by the React widget. -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Phase 7: Cloudflare Web Analytics (cookieless). Token replaced at build time
         from VITE_CF_ANALYTICS_TOKEN; left blank in dev so no beacon ships. -->
    <script>
      (() => {
        // CF Web Analytics の token は base62 + ハイフン/アンダースコアのみ。
        // フォーク時に引用符等が混入しても JS 文字列脱出 → XSS が起きないよう
        // 想定文字集合外を sanitize で削る (Phase 7 review LOW-2 対応)。
        const tRaw = "%VITE_CF_ANALYTICS_TOKEN%";
        if (!tRaw || tRaw.startsWith("%")) return;
        const t = tRaw.replace(/[^A-Za-z0-9_-]/g, "");
        if (!t) return;
        const s = document.createElement("script");
        s.defer = true;
        s.src = "https://static.cloudflareinsights.com/beacon.min.js";
        s.setAttribute("data-cf-beacon", JSON.stringify({ token: t }));
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
