<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#5b6dff" />
    <title>snap-share — 画像URL一発で共同注釈</title>
    <meta
      name="description"
      content="画像にハイライト・吹き出し・矢印・テキストをオーバーレイし、URL一発で共同編集できる、日本語ファーストの軽量Webアプリ。"
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:site_name" content="snap-share" />
    <meta property="og:title" content="snap-share — 画像URL一発で共同注釈" />
    <meta
      property="og:description"
      content="画像にハイライト・吹き出し・矢印・テキストをオーバーレイし、URL一発で共同編集できる、日本語ファーストの軽量Webアプリ。"
    />
    <meta property="og:url" content="%VITE_PUBLIC_URL%" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:type" content="website" />
    <!-- Phase 10.B: og:image / twitter:card=summary_large_image はアプリ名 + ロゴ
         確定 (Phase 10.D) → og-image.png 作成 (Phase 10.F) のタイミングで追加。
         不在資産を参照すると SNS スクレイパが破損プレビューを生成するため、
         今は summary カード (画像なし) で fallback する。 -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="snap-share — 画像URL一発で共同注釈" />
    <meta
      name="twitter:description"
      content="画像にハイライト・吹き出し・矢印・テキストをオーバーレイし、URL一発で共同編集できる、日本語ファーストの軽量Webアプリ。"
    />
    <!-- Phase 7: Cloudflare Turnstile loader. Site key is read at runtime by the React widget. -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Phase 7: Cloudflare Web Analytics (cookieless). Token replaced at build time
         from VITE_CF_ANALYTICS_TOKEN; left blank in dev so no beacon ships. -->
    <script>
      (() => {
        // CF Web Analytics の token は base62 + ハイフン/アンダースコアのみ。
        // フォーク時に引用符等が混入しても JS 文字列脱出 → XSS が起きないよう
        // 想定文字集合外を sanitize で削る (Phase 7 review LOW-2 対応)。
        const tRaw = "%VITE_CF_ANALYTICS_TOKEN%";
        if (!tRaw || tRaw.startsWith("%")) return;
        const t = tRaw.replace(/[^A-Za-z0-9_-]/g, "");
        if (!t) return;
        const s = document.createElement("script");
        s.defer = true;
        s.src = "https://static.cloudflareinsights.com/beacon.min.js";
        s.setAttribute("data-cf-beacon", JSON.stringify({ token: t }));
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
