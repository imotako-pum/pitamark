<?xml version="1.0" encoding="UTF-8"?>
<!--
  Phase 10.H: pitamark Hero placeholder. SVG mock of the editor surface
  showing the four core annotation primitives (rectangle / arrow / text /
  highlight) so first-time visitors see a concrete "what it does" preview.
  Replace with a real WebP screenshot of the live editor in Phase 11+.
  Aspect ratio 1200x750 = 16:10.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-labelledby="hero-svg-title">
  <title id="hero-svg-title">pitamark editor preview — annotations on an example image</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f7fb" />
      <stop offset="1" stop-color="#eef0f6" />
    </linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a8b2d1" />
      <stop offset="1" stop-color="#5b6b8f" />
    </linearGradient>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e74c3c" />
    </marker>
  </defs>

  <!-- App chrome -->
  <rect x="0" y="0" width="1200" height="750" fill="url(#bg)" rx="20" />
  <rect x="40" y="40" width="1120" height="60" fill="#ffffff" rx="14" stroke="#d6d8e0" />
  <circle cx="68" cy="70" r="10" fill="#f56565" />
  <circle cx="96" cy="70" r="10" fill="#ecc94b" />
  <circle cx="124" cy="70" r="10" fill="#48bb78" />
  <text x="170" y="76" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="600" fill="#1a202c">
    pitamark
  </text>
  <!-- Toolbar pill -->
  <rect x="450" y="50" width="300" height="40" rx="20" fill="#f3f4f8" stroke="#d6d8e0" />
  <g font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#4a5568" text-anchor="middle">
    <text x="492" y="74">↖</text>
    <text x="540" y="76">▭</text>
    <text x="588" y="74">↗</text>
    <text x="636" y="76">T</text>
    <text x="684" y="76">▰</text>
    <text x="732" y="74">⤺</text>
  </g>
  <!-- Right slot (lang toggle) -->
  <rect x="1020" y="50" width="120" height="40" rx="14" fill="#ffffff" stroke="#d6d8e0" />
  <text x="1080" y="76" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#4a5568" text-anchor="middle">
    JA · EN
  </text>

  <!-- Photo / canvas area -->
  <rect x="80" y="140" width="1040" height="540" fill="url(#photo)" rx="16" />

  <!-- Photo content suggestion: simple shapes -->
  <g opacity="0.6">
    <circle cx="280" cy="320" r="80" fill="#f3eada" />
    <rect x="430" y="270" width="380" height="120" fill="#3a4663" rx="6" />
    <rect x="200" y="430" width="700" height="160" fill="#2c3551" rx="6" />
  </g>

  <!-- Annotations layered above -->
  <!-- Rectangle annotation -->
  <rect x="380" y="240" width="480" height="180" fill="none" stroke="#e74c3c" stroke-width="6" rx="6" />
  <!-- Arrow annotation -->
  <line x1="940" y1="220" x2="800" y2="290" stroke="#e74c3c" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <!-- Highlight annotation -->
  <rect x="200" y="430" width="700" height="160" fill="#f5d142" opacity="0.45" rx="6" />
  <!-- Text annotation -->
  <rect x="945" y="170" width="160" height="44" rx="10" fill="#ffffff" stroke="#d6d8e0" />
  <text x="1025" y="198" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="700" fill="#e74c3c" text-anchor="middle">
    ここ！
  </text>

  <!-- Caption -->
  <text x="600" y="720" font-family="-apple-system, system-ui, sans-serif" font-size="18" fill="#4a5568" text-anchor="middle" opacity="0.7">
    画像にハイライト・矢印・テキストをのせて URL で共有
  </text>
</svg>
