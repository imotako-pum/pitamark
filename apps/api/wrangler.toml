name = "snap-share-api"
main = "src/index.ts"
compatibility_date = "2026-04-07"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "snap-share-images"

# Yjs/CRDT room state. Phase 5 renames the class to `SnapShareYDO` (a subclass
# of YDurableObjects) so the DO can run TTL alarms via DO Alarms API.
# `new_classes` (NOT `new_sqlite_classes`) — YDurableObjects is KV-backed.
[[durable_objects.bindings]]
name = "Y_ROOM"
class_name = "SnapShareYDO"

[[migrations]]
tag = "v1"
new_classes = ["YDurableObjects"]

[[migrations]]
tag = "v2"
renamed_classes = [{ from = "YDurableObjects", to = "SnapShareYDO" }]

# Phase 7: Workers Rate Limiting bindings.
# - period must be 10 or 60 (no other values supported).
# - namespace_id is an arbitrary positive integer (string) unique within the account.
# - The runtime API is `await env.<NAME>.limit({ key })` returning `{ success }`.

[[ratelimits]]
name = "RL_CREATE_ROOM"
namespace_id = "1001"
[ratelimits.simple]
limit = 5
period = 60

[[ratelimits]]
name = "RL_AUTH"
namespace_id = "1002"
[ratelimits.simple]
limit = 10
period = 60

[[ratelimits]]
name = "RL_SYNC"
namespace_id = "1003"
[ratelimits.simple]
limit = 30
period = 60

# Phase 7: KV namespace for image SHA-256 blocklist. Keys are the lowercase
# hex digest of the original bytes; values are operator-supplied reason
# strings (free-form; only used in dashboards / `wrangler kv key get`).
#
# Provision per-environment (Phase 7.5 runbook):
#   wrangler kv namespace create IMAGE_BLOCKLIST
#   wrangler kv namespace create IMAGE_BLOCKLIST --preview   # 任意 (dev 用)
# Returns a 32-char hex `id` — replace `REPLACE_WITH_PRODUCTION_KV_ID` below
# with that value BEFORE the first `wrangler deploy`. Without this, the
# `image-blocklist-service` falls open (treats every SHA as unblocked) and
# silently disables the blocklist tier. See docs/observability.md.
[[kv_namespaces]]
binding = "IMAGE_BLOCKLIST"
id = "750e562861214964ab8e157b79a1d42d"

[vars]
ROOM_TTL_MS = "604800000" # 7 days
# Public Turnstile site key. The default is the always-passes dev test key
# so `wrangler dev` and CI work without contacting Cloudflare. Phase 7.5:
# replace with the production widget site key (`dashboard.cloudflare.com`
# → Turnstile → Add a site) before running `wrangler deploy`. The key is
# public — safe to commit.
TURNSTILE_SITE_KEY = "0x4AAAAAADHtSX4zIeH_vH_NJOJFTqQCS-A"
# `BYPASS_TURNSTILE` MUST be `"false"` in production. The flag exists only so
# `wrangler dev` and CI can run without contacting the live siteverify endpoint.
# Phase 7.5: confirmed production keeps this `"false"`; local dev overrides via
# `apps/api/.dev.vars` BYPASS_TURNSTILE=true (see .dev.vars.example).
BYPASS_TURNSTILE = "false"
# Phase 7.5: API を叩いてよいブラウザ origin の allowlist（カンマ区切り）。
# 各エントリは以下のいずれか:
#   - 完全オリジン       `https://snap-share.pages.dev`
#   - ワイルドカード接尾辞 `*.snap-share.pages.dev`（https 限定 — Pages の
#                          per-commit preview URL `<hash>.snap-share.pages.dev`
#                          を吸収）
# ローカル dev は `apps/api/.dev.vars` で `http://localhost:5173,4173` を
# 追加上書き（`.dev.vars` は完全置換なので注意）。この `[vars]` は本番
# allowlist のみ。空値は misconfiguration として初回リクエストで例外
# （fail-closed）。fork して別 Pages プロジェクトに deploy する場合は両エントリ
# を fork 側の `<project>.pages.dev` に書き換える。
CORS_ALLOWED_ORIGINS = "https://snap-share.pages.dev,*.snap-share.pages.dev"

# Secrets — set via `wrangler secret put NAME` (production) or
# `apps/api/.dev.vars` (local dev; gitignored. See `.dev.vars.example`).
#   ROOM_TOKEN_SECRET    HS256 JWT signing key for password-protected room tokens. Min 32 bytes.
#   TURNSTILE_SECRET_KEY Cloudflare Turnstile siteverify secret.
